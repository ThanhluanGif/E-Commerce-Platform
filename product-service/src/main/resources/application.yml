server:
  port: 8082

logging:
  level:
    org.springframework.data.elasticsearch: DEBUG
    org.springframework.data.elasticsearch.client.LOGGER: TRACE

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_product?currentSchema=catalog,public
    username: postgres
    password: your_secure_password
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: product-service-hikari-pool
      register-mbeans: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: catalog
  flyway:
    enabled: true
    default-schema: catalog
    schemas: catalog
    create-schemas: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secure_pass}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

app:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}



