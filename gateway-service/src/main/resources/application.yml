server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: product-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**
        - id: order-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
